<!DOCTYPE html>

<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0"
    >

    <title>Gallery | Irish Mountain Trail Runners</title>

    <link
        rel="stylesheet"
        href="css/style.css"
    >

</head>

<body>

    <!-- ===========================
         HEADER
    ============================ -->

    <header class="header">

        <div class="header-left">

            <h1>
                IRISH MOUNTAIN<br>
                TRAIL RUNNERS
            </h1>

            <div class="tagline">
                The most fun you can have in the mountains...
                with your clothes on.
            </div>

        </div>

        <div class="logo">

            <img
                src="images/logo.jpg"
                alt="IMTR Logo"
            >

        </div>

    </header>

    <!-- ===========================
         NAVIGATION
    ============================ -->

    <nav>

        <ul>

            <li><a href="index.html">Home</a></li>

            <li><a href="about.html">About</a></li>

            <li><a href="events.html">Events</a></li>

            <li><a href="gallery.html">Gallery</a></li>

            <li><a href="faq.html">FAQ</a></li>

            <li><a href="members.html">Member Profiles</a></li>

            <li><a href="shop.html">Shop</a></li>

            <li><a href="sponsors.html">Sponsors</a></li>

            <li><a href="contact.html">Contact</a></li>

        </ul>

    </nav>

    <!-- ===========================
         MAIN CONTENT
    ============================ -->

    <main class="container">

        <h2>Gallery</h2>

        <div id="gallery-container"></div>

    </main>

    <!-- ===========================
         GALLERY DATA
    ============================ -->

    <script src="gallery-data.js"></script>

    <!-- ===========================
         GALLERY SCRIPT
    ============================ -->

    <script>

        document.addEventListener('DOMContentLoaded', function () {

            const container = document.getElementById("gallery-container");

            galleries.forEach(function (gallery) {

                let html = `

                    <section class="gallery-section">

                        <h2 class="gallery-title">

                            ${gallery.title}

                        </h2>

                        <p class="gallery-description">

                            ${gallery.description || ""}

                        </p>

                        <div class="gallery-grid">

                `;

                for (let i = 1; i <= gallery.images; i++) {

                    const number = String(i).padStart(2, "0");

                    html += `

                        <img

                            src="images/gallery/${gallery.folder}/${number}.jpg"

                            alt="${gallery.title} - ${number}"

                            loading="lazy"

                            data-full="images/gallery/${gallery.folder}/${number}.jpg"

                        >

                    `;

                }

                html += `

                        </div>

                    </section>

                `;

                container.innerHTML += html;

            });

            /* ==========================
               LIGHTBOX
            ========================== */

            const lightbox = document.createElement("div");

            lightbox.id = "lightbox";

            lightbox.innerHTML = `

                <img
                    id="lightbox-img"
                    alt="Gallery Image"
                >

            `;

            document.body.appendChild(lightbox);

            const lightboxImg = document.getElementById("lightbox-img");

            document.querySelectorAll(".gallery-grid img").forEach(function (img) {

                img.style.cursor = "pointer";

                img.addEventListener("click", function () {

                    lightboxImg.src = this.dataset.full;

                    lightbox.style.display = "flex";

                });

            });

            lightbox.addEventListener("click", function () {

                lightbox.style.display = "none";

            });

        });

    </script>

</body>

</html>
