<!DOCTYPE html>

<html>

<head>

    <title>Gallery</title>

    <link
        rel="stylesheet"
        href="css/style.css"
    >

</head>

<body>

    <!-- HEADER -->

    <header class="header">

        <div class="header-left">

            <h1>
                IRISH MOUNTAIN
                TRAIL RUNNERS
            </h1>

            <div class="tagline">
                The most fun you can have in the mountains...
                with your clothes on.
            </div>

        </div>

        <div class="logo">

            <img
                src="images/logo.jpg"
                alt="IMTR Logo"
            >

        </div>

    </header>

    <!-- NAVIGATION -->

    <nav>

        <ul>

            <li><a href="index.html">Home</a></li>
            <li><a href="about.html">About</a></li>
            <li><a href="events.html">Events</a></li>
            <li><a href="gallery.html">Gallery</a></li>
            <li><a href="sponsors.html">Sponsors</a></li>
            <li><a href="contact.html">Contact</a></li>

        </ul>

    </nav>

    <div class="container">

        <h2>Gallery</h2>

        <div id="gallery-container"></div>

    </div>

     <script src="gallery-data.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const container = document.getElementById("gallery-container");

            galleries.forEach(gallery => {
                let html = `
                    <h2>${gallery.title}</h2>
                    <div class="gallery-grid">
                `;

                for (let i = 1; i <= gallery.images; i++) {
                    const number = String(i).padStart(2, '0');
                    html += `
                        <img 
                            src="images/gallery/${gallery.folder}/${number}.jpg"
                            alt="${gallery.title} - ${number}"
                            loading="lazy"
                            data-full="images/gallery/${gallery.folder}/${number}.jpg"
                        >
                    `;
                }

                html += "</div>";
                container.innerHTML += html;
            });

            // Lightbox functionality
            const lightbox = document.createElement('div');
            lightbox.id = 'lightbox';
            lightbox.style.cssText = `
                display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
                background: rgba(0,0,0,0.95); z-index: 1000; align-items: center;
                justify-content: center; cursor: pointer;
            `;
            lightbox.innerHTML = `<img id="lightbox-img" style="max-width: 95%; max-height: 95%; border: 3px solid #fff;">`;
            document.body.appendChild(lightbox);

            const lightboxImg = document.getElementById('lightbox-img');

            document.querySelectorAll('.gallery-grid img').forEach(img => {
                img.style.cursor = 'pointer';
                img.addEventListener('click', function() {
                    lightboxImg.src = this.dataset.full;
                    lightbox.style.display = 'flex';
                });
            });

            lightbox.addEventListener('click', function(e) {
                if (e.target.id === 'lightbox' || e.target.id === 'lightbox-img') {
                    lightbox.style.display = 'none';
                }
            });
        });
    </script>
</body>

</html>
